<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StudoSpend – Sign In</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ════════════════════════════════
     LOGIN PAGE
════════════════════════════════ -->
<div class="auth-wrap">
  <div class="card">
    <div class="logo-wrap">
      <svg viewBox="0 0 24 24"><path d="M21 7H3a1 1 0 0 0-1 1v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a1 1 0 0 0-1-1zm-1 11H4V9h16v9z"/><path d="M16 13a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/><path d="M7 5h10a1 1 0 0 0 0-2H7a1 1 0 0 0 0 2z"/></svg>
    </div>
    <h1>Welcome to StudoSpend</h1>
    <p class="subtitle">Sign in to continue</p>

    <div class="alert error" id="login-error"></div>

    <button class="btn-google" onclick="googleLogin()">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.1 0 5.8 1.1 7.9 2.9l5.9-5.9C34.4 3.5 29.5 1.5 24 1.5 14.8 1.5 7 7.2 3.7 15.1l6.9 5.4C12.3 14 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.4c-.5 2.8-2.1 5.2-4.5 6.8l7 5.4c4.1-3.8 6.5-9.4 6.5-16.2z"/><path fill="#FBBC05" d="M10.6 28.5c-.5-1.5-.8-3.1-.8-4.7s.3-3.2.8-4.7L3.7 13.7C1.3 18 0 22.8 0 28s1.3 10 3.7 14.3l6.9-5.4c-.5-1.5-.8-3.1-.8-4.4z"/><path fill="#34A853" d="M24 46.5c5.5 0 10.1-1.8 13.5-4.9l-7-5.4c-1.9 1.3-4.3 2-6.5 2-6.3 0-11.7-4.5-13.4-10.5l-6.9 5.4C7 40.8 14.8 46.5 24 46.5z"/></svg>
      Continue with Google
    </button>

    <div class="divider">OR</div>

    <div class="field">
      <label>Email</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
        <input type="email" id="login-email" placeholder="you@example.com"/>
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="login-password" placeholder="••••••••"/>
      </div>
    </div>

    <button class="btn-primary" onclick="doLogin()">Sign in</button>

    <div class="footer-links">
      <span>Forgot password? <a href="signup.html#forgot">Reset</a></span>
      <span>Need an account? <a href="signup.html">Sign up</a></span>
    </div>
  </div>
</div>

<script>
  const user = localStorage.getItem('ss_current_user');
  if (user) {
    window.location.href = "dashboard.html";
  }
  
// ── HELPERS ─────────────────────────────────────

function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'alert ' + type + ' show';
}
function hideAlert(id) { document.getElementById(id).className = 'alert'; }

function googleLogin() { alert('Google OAuth requires a server.\nUse Email/Password for this demo.'); }

// ── LOGIN ────────────────────────────────────────
function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-password').value;
  hideAlert('login-error');

  if (!email || !pass) { showAlert('login-error', 'Please fill in all fields.', 'error'); return; }

  // Load users from localStorage
  const users = JSON.parse(localStorage.getItem('ss_users') || '[]');
  const user  = users.find(u => u.email === email && u.password === pass);

  if (!user) { showAlert('login-error', 'Invalid email or password.', 'error'); return; }

  // Save current session
  localStorage.setItem('ss_current_user', JSON.stringify(user));
  window.location.href = 'dashboard.html';
}

// ── ENTER KEY ────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});
</script>
</body>
</html>
