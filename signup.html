<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>StudoSpend – Sign Up</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ════════════════════════════════
     SIGN UP PAGE
════════════════════════════════ -->
<div id="page-signup" class="page active">
<div class="auth-wrap">
  <div class="card">
    <div class="logo-wrap">
      <svg viewBox="0 0 24 24"><path d="M21 7H3a1 1 0 0 0-1 1v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a1 1 0 0 0-1-1zm-1 11H4V9h16v9z"/><path d="M16 13a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/><path d="M7 5h10a1 1 0 0 0 0-2H7a1 1 0 0 0 0 2z"/></svg>
    </div>
    <h1>Create Account</h1>
    <p class="subtitle">Join StudoSpend today</p>

    <div class="alert error"   id="signup-error"></div>
    <div class="alert success" id="signup-success"></div>

    <button class="btn-google" onclick="googleLogin()">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.1 0 5.8 1.1 7.9 2.9l5.9-5.9C34.4 3.5 29.5 1.5 24 1.5 14.8 1.5 7 7.2 3.7 15.1l6.9 5.4C12.3 14 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.4c-.5 2.8-2.1 5.2-4.5 6.8l7 5.4c4.1-3.8 6.5-9.4 6.5-16.2z"/><path fill="#FBBC05" d="M10.6 28.5c-.5-1.5-.8-3.1-.8-4.7s.3-3.2.8-4.7L3.7 13.7C1.3 18 0 22.8 0 28s1.3 10 3.7 14.3l6.9-5.4c-.5-1.5-.8-3.1-.8-4.4z"/><path fill="#34A853" d="M24 46.5c5.5 0 10.1-1.8 13.5-4.9l-7-5.4c-1.9 1.3-4.3 2-6.5 2-6.3 0-11.7-4.5-13.4-10.5l-6.9 5.4C7 40.8 14.8 46.5 24 46.5z"/></svg>
      Sign up with Google
    </button>

    <div class="divider">OR</div>

    <div class="field">
      <label>Full Name</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="#b0b4cc" stroke-width="1.8"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
        <input type="text" id="signup-name" placeholder="Your full name"/>
      </div>
    </div>
    <div class="field">
      <label>Email</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
        <input type="email" id="signup-email" placeholder="you@example.com"/>
      </div>
    </div>
    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="signup-password" placeholder="Min. 8 characters" oninput="checkStrength(this.value)"/>
      </div>
      <div class="strength-bar">
        <div class="strength-seg" id="s1"></div>
        <div class="strength-seg" id="s2"></div>
        <div class="strength-seg" id="s3"></div>
        <div class="strength-seg" id="s4"></div>
      </div>
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
        <input type="password" id="signup-confirm" placeholder="Repeat password"/>
      </div>
    </div>

    <button class="btn-primary" onclick="doSignup()">Create Account</button>
    <div class="footer-links" style="justify-content:center;margin-top:16px;">
      <span>Already have an account? <a href="login.html">Sign in</a></span>
    </div>
  </div>
</div>
</div>

<!-- ════════════════════════════════
     FORGOT PASSWORD (toggled in-page)
════════════════════════════════ -->
<div id="page-forgot" class="page">
<div class="auth-wrap">
  <div class="card">
    <div class="logo-wrap">
      <svg viewBox="0 0 24 24"><path d="M21 7H3a1 1 0 0 0-1 1v10a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8a1 1 0 0 0-1-1zm-1 11H4V9h16v9z"/><path d="M16 13a1 1 0 1 0 0 2 1 1 0 0 0 0-2z"/><path d="M7 5h10a1 1 0 0 0 0-2H7a1 1 0 0 0 0 2z"/></svg>
    </div>
    <h1>Reset Password</h1>
    <p class="subtitle">We'll send you a reset link</p>

    <div class="alert error"   id="forgot-error"></div>
    <div class="alert success" id="forgot-success"></div>

    <div class="field">
      <label>Email</label>
      <div class="input-wrap">
        <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
        <input type="email" id="forgot-email" placeholder="you@example.com"/>
      </div>
    </div>

    <button class="btn-primary" onclick="doForgot()">Send Reset Link</button>
    <div class="footer-links" style="justify-content:center;margin-top:16px;">
      <span>Remembered it? <a href="#" onclick="showSignup()">Back to Sign up</a> · <a href="login.html">Sign in</a></span>
    </div>
  </div>
</div>
</div>

<script>
  const currentUser = localStorage.getItem('ss_current_user');
  if (currentUser) {
  window.location.href = "dashboard.html";
}
function googleLogin() { alert('Google OAuth requires a server.\nUse Email/Password for this demo.'); }

// ── PAGE TOGGLING ────────────────────────────────
function showSignup() {
  document.getElementById('page-signup').classList.add('active');
  document.getElementById('page-forgot').classList.remove('active');
}
function showForgot() {
  document.getElementById('page-signup').classList.remove('active');
  document.getElementById('page-forgot').classList.add('active');
}

// Check if arriving via #forgot anchor
if (window.location.hash === '#forgot') showForgot();

// ── ALERTS ───────────────────────────────────────
function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'alert ' + type + ' show';
}
function hideAlert(id) { document.getElementById(id).className = 'alert'; }

// ── SIGN UP ──────────────────────────────────────
function doSignup() {
  const name  = document.getElementById('signup-name').value.trim();
  const email = document.getElementById('signup-email').value.trim();
  const pass  = document.getElementById('signup-password').value;
  const conf  = document.getElementById('signup-confirm').value;
  hideAlert('signup-error'); hideAlert('signup-success');

  if (!name || !email || !pass || !conf) { showAlert('signup-error', 'Please fill in all fields.', 'error'); return; }
  if (pass.length < 8) { showAlert('signup-error', 'Password must be at least 8 characters.', 'error'); return; }
  if (pass !== conf) { showAlert('signup-error', 'Passwords do not match.', 'error'); return; }

  const users = JSON.parse(localStorage.getItem('ss_users') || '[]');
  if (users.find(u => u.email === email)) { showAlert('signup-error', 'Email already registered.', 'error'); return; }

  users.push({ name, email, password: pass });
  localStorage.setItem('ss_users', JSON.stringify(users));

  showAlert('signup-success', '✅ Account created! Redirecting to sign in...', 'success');
  setTimeout(() => { window.location.href = 'login.html'; }, 1500);
}

// ── FORGOT PASSWORD ──────────────────────────────
function doForgot() {
  const email = document.getElementById('forgot-email').value.trim();
  hideAlert('forgot-error'); hideAlert('forgot-success');
  if (!email) { showAlert('forgot-error', 'Please enter your email.', 'error'); return; }
  if (!email.includes('@')) { showAlert('forgot-error', 'Enter a valid email.', 'error'); return; }
  showAlert('forgot-success', '📧 Reset link sent! Check your inbox.', 'success');
  document.getElementById('forgot-email').value = '';
}

// ── PASSWORD STRENGTH ────────────────────────────
function checkStrength(val) {
  let s = 0;
  if (val.length >= 8) s++;
  if (/[A-Z]/.test(val)) s++;
  if (/[0-9]/.test(val)) s++;
  if (/[^A-Za-z0-9]/.test(val)) s++;
  const cls = ['', 'weak', 'fair', 'good', 'strong'];
  for (let i = 1; i <= 4; i++)
    document.getElementById('s' + i).className = 'strength-seg' + (i <= s ? ' ' + cls[s] : '');
}

// ── ENTER KEY ────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  if (document.getElementById('page-signup').classList.contains('active')) doSignup();
  if (document.getElementById('page-forgot').classList.contains('active'))  doForgot();
});
</script>
</body>
</html>
